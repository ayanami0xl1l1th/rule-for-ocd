name: Auto Sync Fork

on:
  schedule:
    - cron: "0 7 * * *"
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # checkout
      - name: Init repo (fast)
        run: |
          git init
          git remote add origin https://github.com/${{ github.repository }}.git
          git fetch --depth=1 origin master
          git checkout master

      # Add upstream
      - name: Add upstream
        run: |
          git remote add upstream https://github.com/peiyingyao/Rule-for-OCD.git
          git fetch --depth=1 upstream

      # Check commit difference
      - name: Check updates
        id: check
        run: |
          MAX_COMMITS=10

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          COUNT=$(git rev-list --count ${LOCAL}..${UPSTREAM})

          echo "count=$COUNT"
          echo "count=$COUNT" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt "$MAX_COMMITS" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Too many commits, skip auto sync"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      # Sync upstream
      - name: Sync upstream
        if: steps.check.outputs.skip == 'false'
        run: |
          mkdir -p backup

          cp -f .gitignore README.md .github/workflows/ci.yaml script/convert.sh backup/ || true

          git merge upstream/main --strategy-option theirs --allow-unrelated-histories --no-edit

          cp -f backup/.gitignore .gitignore || true
          cp -f backup/README.md README.md || true
          cp -f backup/ci.yaml .github/workflows/ci.yaml || true
          cp -f backup/convert.sh script/convert.sh || true

      # Push
      - name: Push changes
        if: steps.check.outputs.skip == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [ -n "$(git status --porcelain)" ]; then
            git add -A
            git commit -m "sync upstream"
            git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master
          else
            echo "No changes"
          fi
