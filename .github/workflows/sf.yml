name: Auto Sync Fork

on:
  schedule:
    - cron: "0 7 * * *"   # 每天 UTC 07:00（你可以改）
  workflow_dispatch:

concurrency:
  group: sync-fork
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout fork repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 必须全历史，否则没法比较 commit 数

      - name: Add upstream
        run: |
          git remote add upstream https://github.com/peiyingyao/Rule-for-OCD.git
          git fetch upstream

      - name: Check commit count difference
        id: check
        run: |
          # 👉 这里可以改阈值（默认10）
          MAX_COMMITS=10

          LOCAL=$(git rev-parse HEAD)
          UPSTREAM=$(git rev-parse upstream/main)

          COUNT=$(git rev-list --count ${LOCAL}..${UPSTREAM})

          echo "Upstream ahead commits: $COUNT"

          echo "count=$COUNT" >> $GITHUB_OUTPUT
          echo "max=$MAX_COMMITS" >> $GITHUB_OUTPUT

          if [ "$COUNT" -gt "$MAX_COMMITS" ]; then
            echo "Too many commits, skip auto sync"
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Sync fork
        if: steps.check.outputs.skip == 'false'
        run: |
          git merge upstream/main --no-edit

      - name: Push changes
        if: steps.check.outputs.skip == 'false'
        run: |
          git push origin HEAD:main

      - name: Warning (manual sync needed)
        if: steps.check.outputs.skip == 'true'
        run: |
          echo "⚠️ Upstream commits exceed limit (${{ steps.check.outputs.count }} > ${{ steps.check.outputs.max }})"
          echo "⚠️ Please sync manually!"
